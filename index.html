<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAS Dépannage — Service de Remorquage Premium à Lyon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ============================================
   CSS VARIABLES & RESET
   ============================================ */
:root {
  --bg-primary: #08111f;
  --bg-secondary: #0d1a2e;
  --bg-card: #0f1f35;
  --bg-card-hover: #142540;
  --gold: #c9963a;
  --gold-light: #e4b86a;
  --gold-dark: #a07828;
  --text-primary: #f0e8d8;
  --text-secondary: #9aabbf;
  --text-muted: #5a7288;
  --red-banner: #991b1b;
  --border: rgba(201, 150, 58, 0.2);
  --border-strong: rgba(201, 150, 58, 0.5);
  --shadow-gold: 0 0 30px rgba(201, 150, 58, 0.15);
  --shadow-deep: 0 20px 60px rgba(0,0,0,0.5);
  --radius: 4px;
  --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  scroll-behavior: smooth;
  font-size: 16px;
}

body {
  background-color: var(--bg-primary);
  color: var(--text-primary);
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  line-height: 1.6;
  overflow-x: hidden;
}

a {
  text-decoration: none;
  color: inherit;
}

img { max-width: 100%; }

/* ============================================
   TIMER BANNER (STICKY, z-index 1000)
   ============================================ */
#timer-banner {
  position: sticky;
  top: 0;
  z-index: 1000;
  background-color: var(--red-banner);
  color: #fff;
  text-align: center;
  padding: 10px 20px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.03em;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}

#timer-banner span.label {
  opacity: 0.9;
}

#timer-banner span.countdown {
  font-weight: 700;
  font-size: 1rem;
  background: rgba(0,0,0,0.25);
  padding: 2px 10px;
  border-radius: 3px;
  letter-spacing: 0.05em;
  font-variant-numeric: tabular-nums;
}

#timer-banner.expired {
  display: none;
}

/* ============================================
   NAVIGATION STICKY
   ============================================ */
#navbar {
  position: sticky;
  top: 41px;
  z-index: 999;
  background: rgba(8, 17, 31, 0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 72px;
  transition: var(--transition);
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.nav-logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
}

.nav-logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.1;
}

.nav-logo-text strong {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0.02em;
}

.nav-logo-text span {
  font-size: 0.7rem;
  font-weight: 400;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 0.12em;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 36px;
  list-style: none;
}

.nav-links a {
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  transition: color 0.3s;
  position: relative;
}

.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 0;
  width: 0;
  height: 1px;
  background: var(--gold);
  transition: width 0.3s;
}

.nav-links a:hover {
  color: var(--gold);
}

.nav-links a:hover::after {
  width: 100%;
}

.nav-cta {
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: var(--bg-primary) !important;
  padding: 10px 22px;
  border-radius: var(--radius);
  font-weight: 600 !important;
  font-size: 0.85rem !important;
  letter-spacing: 0.05em;
  transition: var(--transition) !important;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

.nav-cta:hover {
  background: linear-gradient(135deg, var(--gold-light), var(--gold)) !important;
  transform: translateY(-1px);
  box-shadow: 0 8px 25px rgba(201, 150, 58, 0.3);
  color: var(--bg-primary) !important;
}

.nav-cta::after {
  display: none !important;
}

/* Mobile hamburger */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 5px;
}

.hamburger span {
  width: 24px;
  height: 2px;
  background: var(--gold);
  transition: var(--transition);
  display: block;
}

/* ============================================
   HERO SECTION
   ============================================ */
#hero {
  min-height: 100vh;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  padding: 80px 40px;
}

.hero-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}

.hero-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201, 150, 58, 0.08) 0%, transparent 70%),
    radial-gradient(ellipse 60% 80% at 100% 50%, rgba(201, 150, 58, 0.05) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 0% 80%, rgba(13, 26, 46, 0.8) 0%, transparent 60%);
}

/* Road grid animation */
.hero-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(201, 150, 58, 0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201, 150, 58, 0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  animation: gridScroll 20s linear infinite;
}

@keyframes gridScroll {
  0% { background-position: 0 0; }
  100% { background-position: 60px 60px; }
}

/* Floating shapes */
.hero-shape {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.12;
  animation: floatShape 8s ease-in-out infinite;
}

.hero-shape-1 {
  width: 400px; height: 400px;
  background: var(--gold);
  top: -100px; right: -100px;
  animation-delay: 0s;
}

.hero-shape-2 {
  width: 300px; height: 300px;
  background: #1a4a8a;
  bottom: 10%; left: -80px;
  animation-delay: -4s;
}

@keyframes floatShape {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-30px) scale(1.05); }
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 900px;
  text-align: center;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(201, 150, 58, 0.1);
  border: 1px solid var(--border-strong);
  color: var(--gold);
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 6px 18px;
  border-radius: 50px;
  margin-bottom: 28px;
}

.hero-badge::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--gold);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.3); }
}

.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.5rem, 7vw, 5.5rem);
  font-weight: 700;
  line-height: 1.1;
  margin-bottom: 24px;
  color: var(--text-primary);
}

.hero-title em {
  font-style: italic;
  color: var(--gold);
  position: relative;
  display: inline-block;
}

.hero-title em::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 0;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.hero-subtitle {
  font-size: clamp(1rem, 2vw, 1.2rem);
  color: var(--text-secondary);
  max-width: 560px;
  margin: 0 auto 44px;
  font-weight: 300;
  line-height: 1.7;
}

/* Hero stats */
.hero-stats {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  margin-bottom: 44px;
  flex-wrap: wrap;
}

.hero-stat {
  padding: 20px 40px;
  text-align: center;
  position: relative;
}

.hero-stat:not(:last-child)::after {
  content: '';
  position: absolute;
  right: 0;
  top: 25%;
  height: 50%;
  width: 1px;
  background: var(--border);
}

.hero-stat-number {
  font-family: 'Playfair Display', serif;
  font-size: 2.2rem;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
  margin-bottom: 6px;
}

.hero-stat-label {
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

/* Hero CTAs */
.hero-ctas {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: var(--bg-primary);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  padding: 16px 36px;
  border-radius: var(--radius);
  border: none;
  cursor: pointer;
  transition: var(--transition);
  letter-spacing: 0.03em;
  position: relative;
  overflow: hidden;
}

.btn-primary::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  opacity: 0;
  transition: opacity 0.3s;
}

.btn-primary:hover::before {
  opacity: 1;
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 40px rgba(201, 150, 58, 0.35);
}

.btn-primary span { position: relative; z-index: 1; }

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: transparent;
  color: var(--text-primary);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  font-weight: 500;
  padding: 16px 36px;
  border-radius: var(--radius);
  border: 1px solid var(--border-strong);
  cursor: pointer;
  transition: var(--transition);
  letter-spacing: 0.03em;
}

.btn-secondary:hover {
  background: rgba(201, 150, 58, 0.08);
  border-color: var(--gold);
  color: var(--gold);
  transform: translateY(-3px);
}

/* ============================================
   TRUST RIBBON
   ============================================ */
#trust {
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 28px 40px;
}

.trust-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 32px;
  flex-wrap: wrap;
}

.trust-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-secondary);
  white-space: nowrap;
}

.trust-check {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: rgba(201, 150, 58, 0.15);
  border: 1px solid var(--border-strong);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--gold);
  font-size: 0.7rem;
  font-weight: 700;
  flex-shrink: 0;
}

.trust-divider {
  width: 1px;
  height: 28px;
  background: var(--border);
  flex-shrink: 0;
}

/* ============================================
   MARQUEE ANIMÉ
   ============================================ */
#marquee-section {
  overflow: hidden;
  background: rgba(201, 150, 58, 0.06);
  border-bottom: 1px solid var(--border);
  padding: 18px 0;
}

.marquee-track {
  display: flex;
  width: max-content;
  animation: marqueeScroll 30s linear infinite;
}

.marquee-track:hover {
  animation-play-state: paused;
}

@keyframes marqueeScroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

.marquee-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 36px;
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  white-space: nowrap;
  transition: color 0.3s;
}

.marquee-item:hover {
  color: var(--gold);
}

.marquee-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0.5;
  flex-shrink: 0;
}

/* ============================================
   SECTION HEADERS
   ============================================ */
.section-header {
  text-align: center;
  margin-bottom: 60px;
}

.section-tag {
  display: inline-block;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 14px;
}

.section-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.8rem, 4vw, 3rem);
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.2;
  margin-bottom: 16px;
}

.section-title em {
  font-style: italic;
  color: var(--gold);
}

.section-subtitle {
  font-size: 1rem;
  color: var(--text-secondary);
  max-width: 500px;
  margin: 0 auto;
  line-height: 1.7;
  font-weight: 300;
}

.section-line {
  width: 60px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 20px auto 0;
}

/* ============================================
   SERVICES GRID
   ============================================ */
#services {
  padding: 100px 40px;
  max-width: 1300px;
  margin: 0 auto;
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 2px;
}

.service-card {
  position: relative;
  background: var(--bg-card);
  padding: 48px 36px;
  overflow: hidden;
  cursor: pointer;
  transition: var(--transition);
}

.service-card::before {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  transition: width 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.service-card:hover::before {
  width: 100%;
}

.service-card:hover {
  background: var(--bg-card-hover);
  transform: translateY(-4px);
  box-shadow: var(--shadow-gold), var(--shadow-deep);
}

.service-number {
  font-family: 'Playfair Display', serif;
  font-size: 3rem;
  font-weight: 700;
  color: rgba(201, 150, 58, 0.12);
  line-height: 1;
  margin-bottom: 20px;
  transition: color 0.4s;
}

.service-card:hover .service-number {
  color: rgba(201, 150, 58, 0.25);
}

.service-icon {
  font-size: 2.2rem;
  margin-bottom: 18px;
  display: block;
  transition: transform 0.4s;
}

.service-card:hover .service-icon {
  transform: scale(1.15) rotate(-3deg);
}

.service-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.35rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 12px;
  line-height: 1.3;
}

.service-desc {
  font-size: 0.88rem;
  color: var(--text-secondary);
  line-height: 1.7;
  font-weight: 300;
}

.service-arrow {
  position: absolute;
  top: 36px;
  right: 36px;
  width: 32px;
  height: 32px;
  border: 1px solid var(--border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  font-size: 0.8rem;
  transition: var(--transition);
}

.service-card:hover .service-arrow {
  background: var(--gold);
  border-color: var(--gold);
  color: var(--bg-primary);
  transform: rotate(45deg);
}

/* ============================================
   TESTIMONIALS
   ============================================ */
#testimonials {
  padding: 100px 40px;
  background: var(--bg-secondary);
  position: relative;
  overflow: hidden;
}

#testimonials::before {
  content: '"';
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Playfair Display', serif;
  font-size: 20rem;
  font-weight: 700;
  color: rgba(201, 150, 58, 0.03);
  line-height: 1;
  pointer-events: none;
}

.testimonials-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
  max-width: 1200px;
  margin: 0 auto;
}

.testimonial-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 40px 36px;
  position: relative;
  transition: var(--transition);
}

.testimonial-card:hover {
  border-color: var(--border-strong);
  transform: translateY(-6px);
  box-shadow: var(--shadow-gold);
}

.testimonial-card::before {
  content: '"';
  position: absolute;
  top: 20px;
  right: 30px;
  font-family: 'Playfair Display', serif;
  font-size: 4rem;
  color: rgba(201, 150, 58, 0.15);
  line-height: 1;
}

.testimonial-stars {
  display: flex;
  gap: 3px;
  margin-bottom: 18px;
}

.star {
  color: var(--gold);
  font-size: 0.9rem;
}

.testimonial-text {
  font-size: 0.95rem;
  color: var(--text-secondary);
  line-height: 1.75;
  font-style: italic;
  margin-bottom: 28px;
  font-weight: 300;
}

.testimonial-author {
  display: flex;
  align-items: center;
  gap: 14px;
}

.author-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--bg-primary);
  flex-shrink: 0;
}

.author-info strong {
  display: block;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-primary);
}

.author-info span {
  font-size: 0.78rem;
  color: var(--text-muted);
}

/* ============================================
   CTA FINAL SECTION
   ============================================ */
#cta-final {
  padding: 100px 40px;
  position: relative;
  overflow: hidden;
  text-align: center;
}

#cta-final::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(201, 150, 58, 0.06) 0%, transparent 70%);
}

.cta-inner {
  position: relative;
  z-index: 1;
  max-width: 800px;
  margin: 0 auto;
}

.cta-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.2;
  margin-bottom: 16px;
}

.cta-title em {
  font-style: italic;
  color: var(--gold);
}

.cta-subtitle {
  font-size: 1.05rem;
  color: var(--text-secondary);
  margin-bottom: 52px;
  font-weight: 300;
}

/* Price Box */
.price-box-container {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 40px;
}

.price-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 36px 32px;
  min-width: 220px;
  text-align: center;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}

.price-box.featured {
  border-color: var(--gold);
  background: var(--bg-card-hover);
}

.price-box.featured::before {
  content: 'Populaire';
  position: absolute;
  top: 14px;
  right: -22px;
  background: var(--gold);
  color: var(--bg-primary);
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 4px 30px;
  transform: rotate(45deg);
}

.price-box:hover {
  border-color: var(--border-strong);
  transform: translateY(-5px);
  box-shadow: var(--shadow-gold);
}

.price-box-icon {
  font-size: 2rem;
  margin-bottom: 12px;
  display: block;
}

.price-box-name {
  font-size: 0.78rem;
  font-weight: 600;
